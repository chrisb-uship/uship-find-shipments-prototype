<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>uShip · Find Shipments</title>
<link rel="stylesheet" href="ds/colors_and_type.css">
<link rel="stylesheet" href="ds/components.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --nav-dark: rgb(0,31,51);
    --screen-w: 390px;
    --screen-h: 844px;
  }
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #c9ccd1;
    display: grid;
    place-items: center;
    font-family: var(--font-sans);
    overflow: hidden;
  }
  #root { width: 100%; height: 100%; display: grid; place-items: center; }

  /* ---- Phone shell ---- */
  .phone {
    position: relative;
    width: var(--screen-w);
    height: var(--screen-h);
    background: var(--gray-0);
    border-radius: 44px;
    box-shadow: 0 2px 6px rgba(0,0,0,.18), 0 30px 70px rgba(0,0,0,.34);
    overflow: hidden;
    border: 11px solid #0a0a0c;
    box-sizing: content-box;
  }
  .phone__notch {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 150px; height: 30px; background: #0a0a0c;
    border-bottom-left-radius: 18px; border-bottom-right-radius: 18px;
    z-index: 60;
  }
  .screen-stack { position: absolute; inset: 0; overflow: hidden; }

  /* iOS status bar (sits inside dark headers) */
  .statusbar {
    height: 44px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px 0 32px; color: #fff;
    font: 700 15px/1 var(--font-sans);
  }
  .statusbar__right { display: flex; align-items: center; gap: 7px; }
  .statusbar__right svg { width: 17px; height: 17px; }

  /* App bar */
  .appbar {
    background: var(--nav-dark); color: #fff;
    display: flex; flex-direction: column;
  }
  .appbar__row {
    height: 52px; display: grid; grid-template-columns: 60px 1fr 60px;
    align-items: center; padding: 0 8px;
  }
  .appbar__title { text-align: center; font: 700 18px/1 var(--font-sans); color: #fff; }
  .appbar__btn {
    background: none; border: 0; cursor: pointer; height: 44px;
    display: flex; align-items: center; gap: 4px;
    font: 600 16px/1 var(--font-sans); padding: 0 8px;
  }
  .appbar__btn svg { width: 24px; height: 24px; }
  .appbar__btn--icon { color: #fff; }
  .appbar__btn--text { color: var(--blue-400); justify-content: flex-end; }
  .appbar__btn--left { justify-content: flex-start; }

  /* Generic screen scaffolding */
  .scr { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--surface-layer-01); }
  .scr__body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .scr__body::-webkit-scrollbar { width: 0; }

  /* push / sheet transitions */
  .push-enter { transform: translateX(100%); }
  .push-enter-active { transform: translateX(0); transition: transform .26s cubic-bezier(.2,0,0,1); }
  .push-exit-active { transform: translateX(100%); transition: transform .26s cubic-bezier(.2,0,0,1); }
  .layer { position: absolute; inset: 0; background: var(--surface-layer-01); will-change: transform; }

  .scrim {
    position: absolute; inset: 0; background: rgba(0,31,51,0.32);
    z-index: 40; opacity: 0; transition: opacity .24s ease;
  }
  .scrim--show { opacity: 1; }

  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 50;
    background: var(--gray-0);
    border-top-left-radius: 20px; border-top-right-radius: 20px;
    display: flex; flex-direction: column;
    max-height: 92%;
    transform: translateY(100%); transition: transform .28s cubic-bezier(.2,0,0,1);
    box-shadow: 0 -4px 24px rgba(0,0,0,.16);
  }
  .sheet--show { transform: translateY(0); }
  .sheet { overflow: hidden; }
  @keyframes slideInRight { from { transform: translateX(100%);} to { transform: translateX(0);} }
  .slide-in-right { animation: slideInRight .26s cubic-bezier(.2,0,0,1) both; }

  /* shipment overlay badges */
  .ship-badge {
    display: inline-flex; align-items: center; gap: 4px;
    height: 24px; padding: 0 8px; border-radius: 4px;
    font: 700 11px/1 var(--font-sans); letter-spacing: .4px; color: #fff;
  }
  .ship-badge svg { width: 13px; height: 13px; }
  .ship-badge--ex { background: var(--purple-600); }
  .ship-badge--auto { background: var(--blue-600); }
  .ship-badge--offer { background: var(--orange-700, #B45309); }
  .cat-row__chev { display: grid; place-items: center; }
  .sheet__grab { width: 40px; height: 5px; border-radius: 999px; background: var(--gray-300); margin: 8px auto 0; flex-shrink: 0; }
  .sheet__head {
    display: grid; grid-template-columns: 44px 1fr auto; align-items: center;
    padding: 6px 12px 14px; border-bottom: 1px solid var(--gray-200);
  }
  .sheet__head h2 { text-align: center; font: 700 18px/1 var(--font-sans); color: var(--gray-800); }
  .sheet__x { background: none; border: 0; cursor: pointer; color: var(--blue-600); display: grid; place-items: center; width: 44px; height: 44px; }
  .sheet__x svg { width: 22px; height: 22px; }
  .sheet__clear { background: none; border: 0; cursor: pointer; color: var(--blue-600); font: 600 16px/1 var(--font-sans); text-align: right; padding: 0 8px; white-space: nowrap; }
  .sheet__body { overflow-y: auto; flex: 1; }
  .sheet__body::-webkit-scrollbar { width: 0; }
  .sheet__foot { padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--gray-200); background: var(--gray-0); }

  /* fade for tab content */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px);} to {opacity:1; transform:none;} }
  .fade-up { animation: fadeUp .22s ease both; }

  .btn-block { width: 100%; }
  .tnum { font-variant-numeric: tabular-nums; }

  /* ---- Location picker ---- */
  .loc-section-label, .loc-block__label {
    font: 400 13px/16px var(--font-sans); color: var(--gray-600);
    padding: 14px 16px 8px;
  }
  .loc-block { padding: 4px 16px 16px; background: var(--gray-0); }
  .loc-block__label { padding: 14px 0 10px; }
  .loc-result {
    width: 100%; background: var(--gray-0); border: 0; cursor: pointer;
    display: flex; align-items: center; gap: 14px; padding: 14px 16px; text-align: left;
  }
  .loc-result:active { background: var(--gray-50); }
  .loc-result__main { display: flex; flex-direction: column; gap: 1px; }
  .loc-result__name { font: 400 16px/22px var(--font-sans); color: var(--gray-800); }
  .loc-result__type { font: 400 13px/17px var(--font-sans); color: var(--gray-500); }
  .loc-chip {
    display: inline-flex; align-items: center; gap: 8px;
    height: 34px; padding: 0 6px 0 14px; border-radius: 999px;
    background: var(--blue-50); border: 1px solid var(--blue-200);
    font: 400 15px/1 var(--font-sans); color: var(--blue-700);
  }
  .loc-chip button { background: none; border: 0; cursor: pointer; color: var(--blue-600); display: grid; place-items: center; width: 24px; height: 24px; border-radius: 999px; }
  .loc-chip button:active { background: rgba(2,124,177,.14); }
  .loc-radius-pill {
    height: 40px; padding: 0 18px; border-radius: 999px; cursor: pointer;
    background: var(--gray-0); border: 1px solid var(--gray-300);
    font: 400 15px/1 var(--font-sans); color: var(--gray-800);
    transition: background .12s, border-color .12s, color .12s;
  }
  .loc-radius-pill[aria-selected="true"] { background: var(--blue-600); border-color: var(--blue-600); color: #fff; font-weight: 700; }
  .loc-quick {
    width: 100%; background: var(--gray-0); border: 0; cursor: pointer;
    display: flex; align-items: center; gap: 14px; padding: 14px 0; text-align: left;
  }
  .loc-quick__ic {
    width: 40px; height: 40px; border-radius: 999px; flex-shrink: 0;
    display: grid; place-items: center; color: var(--gray-700);
    border: 1px solid var(--gray-300); background: var(--gray-0);
  }
  .loc-quick__ic[data-on="true"] { border-color: var(--blue-300, var(--blue-400)); background: var(--blue-50); color: var(--blue-600); }
  .loc-quick__main { flex: 1; display: flex; flex-direction: column; gap: 1px; }
  .loc-quick__title { font: 700 16px/21px var(--font-sans); color: var(--gray-800); }
  .loc-quick__title[data-on="true"] { color: var(--blue-600); }
  .loc-quick__sub { font: 400 13px/17px var(--font-sans); color: var(--gray-500); }
  .loc-applied { font: 400 13px/17px var(--font-sans); color: var(--gray-600); margin-top: 12px; }

  /* ---- Filters / detail rows ---- */
  .frow {
    width: 100%; background: var(--gray-0); border: 0; cursor: pointer; text-align: left;
    display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 10px;
    padding: 18px 16px; border-bottom: 1px solid var(--gray-200);
  }
  .frow:active { background: var(--gray-50); }
  .frow--active { background: var(--blue-50); }
  .frow__title { font: 700 17px/22px var(--font-sans); color: var(--gray-800); display: block; }
  .frow__sub { font: 400 14px/19px var(--font-sans); color: var(--gray-600); margin-top: 2px; display: block; }
  .frow--active .frow__sub { color: var(--blue-600); }
  .frow__chev { color: var(--blue-600); display: grid; place-items: center; }
  .frow__count {
    min-width: 24px; height: 24px; padding: 0 8px; border-radius: 999px;
    background: var(--blue-600); color: #fff; font: 700 12px/24px var(--font-sans);
    text-align: center; font-variant-numeric: tabular-nums;
  }

  /* ---- Selectable option cards (radio) ---- */
  .opt-card {
    width: 100%; text-align: left; cursor: pointer; background: var(--gray-0);
    border: 1px solid var(--gray-300); border-radius: 10px; padding: 16px;
    display: flex; align-items: flex-start; gap: 14px; transition: border-color .12s, background .12s;
  }
  .opt-card + .opt-card { margin-top: 12px; }
  .opt-card[aria-selected="true"] { border-color: var(--blue-600); background: var(--blue-50); }
  .opt-card__radio {
    width: 22px; height: 22px; border-radius: 999px; border: 1.5px solid var(--gray-400);
    flex-shrink: 0; margin-top: 1px; display: grid; place-items: center; background: var(--gray-0);
  }
  .opt-card[aria-selected="true"] .opt-card__radio { border-color: var(--blue-600); border-width: 6px; }
  .opt-card__title { font: 700 16px/22px var(--font-sans); color: var(--gray-800); display: block; }
  .opt-card[aria-selected="true"] .opt-card__title { color: var(--blue-700); }
  .opt-card__desc { font: 400 14px/19px var(--font-sans); color: var(--gray-600); margin-top: 2px; display: block; }

  /* ---- Checkbox rows ---- */
  .chk-row {
    width: 100%; background: var(--gray-0); border: 0; cursor: pointer; text-align: left;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 18px 16px; border-bottom: 1px solid var(--gray-200);
  }
  .chk-row:active { background: var(--gray-50); }
  .chk-row__label { font: 400 16px/22px var(--font-sans); color: var(--gray-800); display: flex; align-items: center; gap: 8px; }
  .chk-box {
    width: 22px; height: 22px; border-radius: 4px; border: 1px solid var(--gray-400);
    background: var(--gray-0); flex-shrink: 0; display: grid; place-items: center; color: #fff;
  }
  .chk-box[data-on="true"] { background: var(--blue-600); border-color: var(--blue-600); }
  .detail-intro { font: 400 14px/20px var(--font-sans); color: var(--gray-600); padding: 16px 16px 4px; }
  .detail-group-h { font: 700 16px/22px var(--font-sans); color: var(--gray-800); padding: 18px 16px 6px; }
  .seg-toggle { display: inline-flex; background: var(--gray-150); border-radius: 8px; padding: 3px; }
  .seg-toggle button {
    border: 0; background: none; cursor: pointer; padding: 6px 16px; border-radius: 6px;
    font: 700 14px/1 var(--font-sans); color: var(--gray-600);
  }
  .seg-toggle button[aria-selected="true"] { background: var(--gray-0); color: var(--gray-900); box-shadow: 0 1px 2px rgba(0,0,0,.12); }
  .or-divider { display: flex; align-items: center; gap: 12px; color: var(--gray-500); font: 400 13px/1 var(--font-sans); padding: 18px 16px; }
  .or-divider::before, .or-divider::after { content: ""; height: 1px; background: var(--gray-200); flex: 1; }

  /* ---- Category sheet ---- */
  .cat-row {
    width: 100%; background: var(--gray-0); border: 0; cursor: pointer; text-align: left;
    display: grid; grid-template-columns: 44px 1fr auto; align-items: center; gap: 16px;
    padding: 14px 16px; border-bottom: 1px solid var(--gray-200);
  }
  .cat-row:active { background: var(--gray-50); }
  .cat-row--active { background: var(--blue-50); }
  .cat-row__ic {
    width: 44px; height: 44px; border-radius: 10px; background: var(--gray-100);
    display: grid; place-items: center; color: var(--gray-600);
  }
  .cat-row--active .cat-row__ic { background: var(--blue-100); color: var(--blue-700); }
  .cat-row__label { font: 700 17px/22px var(--font-sans); color: var(--gray-800); display: block; }
  .cat-row__sub { font: 400 14px/19px var(--font-sans); color: var(--blue-600); margin-top: 2px; display: block; }
  .cat-sub {
    width: 100%; background: var(--gray-0); border: 0; cursor: pointer; text-align: left;
    display: flex; align-items: center; gap: 14px; padding: 12px 16px 12px 24px;
  }
  .cat-sub:active { background: var(--gray-50); }
  .cat-sub__label { font: 700 15px/20px var(--font-sans); color: var(--gray-800); }
  .ghost-link { width: 100%; background: none; border: 0; cursor: pointer; color: var(--gray-600); font: 400 16px/1 var(--font-sans); padding: 14px 0 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="js/icons.jsx"></script>
<script type="text/babel" src="js/data.jsx"></script>
<script type="text/babel" src="js/location-picker.jsx"></script>
<script type="text/babel" src="js/filter-details.jsx"></script>
<script type="text/babel" src="js/category-sheet.jsx"></script>
<script type="text/babel" src="js/filters-sheet.jsx"></script>
<script type="text/babel" src="js/search-screen.jsx"></script>
<script type="text/babel" src="js/app.jsx"></script>
</body>
</html>
